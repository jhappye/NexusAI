# NexusAI 极简部署配置
# 适用于 50-100 用户规模
version: '3.8'

services:
  # NexusAI Web 前端
  web:
    image: nexusai/web:latest
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - APP_API_URL=${APP_API_URL:-http://api:5001}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_COOKIE_DOMAIN=${NEXT_PUBLIC_COOKIE_DOMAIN:-}
    networks:
      - nexusai-network

  # NexusAI API 后端
  api:
    image: nexusai/api:latest
    restart: unless-stopped
    ports:
      - "${API_PORT:-5001}:5001"
    environment:
      - MODE=api
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-nexusai}
      - DB_PASSWORD=${DB_PASSWORD:-nexusai123456}
      - DB_DATABASE=${DB_DATABASE:-nexusai}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-nexusai123456}
      - WEAVIATE_URL=http://weaviate:8080
      - APP_NAME=NexusAI
      - SECRET_KEY=${SECRET_KEY:-sk-nexusai-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./volumes/api/storage:/app/api/storage
    networks:
      - nexusai-network

  # NexusAI Worker (Celery)
  worker:
    image: nexusai/api:latest
    restart: unless-stopped
    command: celery worker -A celery_app.app --loglevel=info
    environment:
      - MODE=worker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-nexusai}
      - DB_PASSWORD=${DB_PASSWORD:-nexusai123456}
      - DB_DATABASE=${DB_DATABASE:-nexusai}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-nexusai123456}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./volumes/api/storage:/app/api/storage
    networks:
      - nexusai-network

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${DB_DATABASE:-nexusai}
      - POSTGRES_USER=${DB_USERNAME:-nexusai}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-nexusai123456}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME:-nexusai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusai-network

  # Redis 缓存
  redis:
    image: redis:6-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexusai123456}
    volumes:
      - redis-data:/data
    networks:
      - nexusai-network

  # Weaviate 向量数据库
  weaviate:
    image: semitechnologies/weaviate:latest
    restart: unless-stopped
    ports:
      - "${WEAVIATE_PORT:-8080}:8080"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
    volumes:
      - weaviate-data:/var/lib/weaviate
    networks:
      - nexusai-network

networks:
  nexusai-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  weaviate-data: